  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:920},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1F4EFF&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#1F4EFF&quot;,&quot;#F5A300&quot;,&quot;#12B886&quot;,&quot;#2B2B2E&quot;]},&quot;defaultLang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;es&quot;,&quot;options&quot;:[&quot;es&quot;,&quot;en&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showGrid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nconst C = {\n  es: {\n    labels: { perfil:\"Perfil\", experiencia:\"Experiencia\", formacion:\"Formación\", skills:\"Habilidades\", contacto:\"Contacto\" },\n    hero: {\n      eyebrow:\"Ingeniería en Energía Eléctrica · UBA\",\n      titleA:\"Román\", titleB:\"Miraglia\",\n      role:\"Estudiante de Ingeniería · Pasante en Mecatrónica\",\n      tagline:\"Formación técnica en electromecánica, mentalidad de alto rendimiento y enfoque analítico — orientado a organizaciones dinámicas e internacionales.\"\n    },\n    profile: {\n      lead:\"Estudiante de Ingeniería en Energía Eléctrica con formación técnica en Electromecánica y fuerte capacidad analítica.\",\n      body:\"Experiencia en entornos de alto rendimiento deportivo y contextos orientados a objetivos, desarrollando disciplina, resiliencia y trabajo en equipo. Actualmente me desempeño en un equipo de trabajo grande que fortalece mis habilidades de comunicación, negociación y orientación a resultados. Interesado en desarrollarme en organizaciones dinámicas e internacionales, aportando pensamiento analítico, adaptabilidad y enfoque colaborativo.\"\n    },\n    facts: [\n      { k:\"Ubicación\", v:\"San Isidro, GBA Norte\" },\n      { k:\"Nacimiento\", v:\"07 Mar 2007\" },\n      { k:\"Enfoque\", v:\"Energía eléctrica · Mecatrónica\" },\n      { k:\"Disponibilidad\", v:\"Pasantías / roles intl.\" }\n    ],\n    experience: [\n      { period:\"Mar 2026 — Presente\", role:\"Pasante de Ingeniería\", org:\"Laboratorio Pablo Cassará\",\n        meta:\"Sistema Dual · Tecnicatura en Mecatrónica · AHK (Cámara Argentino-Alemana)\",\n        points:[\n          \"Primera experiencia en una industria real, desarrollando la comunicación con el equipo e intercambiando ideas y proyectos con otros sectores.\",\n          \"Comprensión de la excelencia y la estructura que exige el sector, y de cómo llevarla a la práctica.\"\n        ],\n        tags:[\"Industria\",\"Mecatrónica\",\"Trabajo en equipo\"] },\n      { period:\"May 2025 — Dic 2025\", role:\"Práctica Profesionalizante\", org:\"FabLab\",\n        meta:\"Fabricación digital · Ámbito escolar\",\n        points:[\n          \"Capacitación en fabricación digital: impresión 3D, corte láser y CNC.\",\n          \"Colaboración en equipos técnicos multidisciplinarios.\",\n          \"Participación en el concurso LOGO! 2025 de Siemens.\"\n        ],\n        tags:[\"Impresión 3D\",\"Corte láser\",\"CNC\",\"Siemens LOGO!\"] },\n      { period:\"2023\", role:\"Deportista de Alto Rendimiento\", org:\"Federación Argentina de Canoas\",\n        meta:\"Canotaje · Competencia federada\",\n        points:[\n          \"Competencia en el Campeonato Sudamericano de Canotaje.\",\n          \"Planificación de objetivos a largo plazo y entrenamientos estructurados.\",\n          \"Resiliencia, disciplina y desempeño bajo presión.\"\n        ],\n        tags:[\"Alto rendimiento\",\"Disciplina\",\"Resiliencia\"] }\n    ],\n    education: [\n      { period:\"Actualidad\", title:\"Ingeniería en Energía Eléctrica\", place:\"Universidad de Buenos Aires (UBA)\", note:\"En curso\" },\n      { period:\"2019 — 2025\", title:\"Técnico Electromecánico\", place:\"Instituto Juan Segundo Fernández · San Isidro\", note:\"Secundario · Orientación electromecánica\" },\n      { period:\"2013 — 2018\", title:\"Educación Primaria\", place:\"Instituto Cervantes\", note:\"Nivel primario\" }\n    ],\n    skillLabels: { tech:\"Técnicas\", soft:\"Personales\", langs:\"Idiomas\" },\n    techSkills:[\"Impresión 3D\",\"Corte láser\",\"CNC\",\"Fabricación digital\",\"Siemens LOGO!\",\"Electromecánica\",\"Pensamiento analítico\"],\n    softSkills:[\"Extrovertido\",\"Flexible\",\"Versátil\",\"Paciente\",\"Proactivo\",\"Empático\",\"Solidario\",\"Creativo\"],\n    languages:[\"Español\",\"Inglés\"],\n    contact: { heading:\"Construyamos algo juntos.\", sub:\"Disponible para pasantías y proyectos en entornos técnicos e internacionales. Escribime y conversemos.\", cta:\"Enviar correo\" },\n    footer:\"Disponible para nuevas oportunidades\"\n  },\n  en: {\n    labels: { perfil:\"About\", experiencia:\"Experience\", formacion:\"Education\", skills:\"Skills\", contacto:\"Contact\" },\n    hero: {\n      eyebrow:\"Electrical Energy Engineering · UBA\",\n      titleA:\"Román\", titleB:\"Miraglia\",\n      role:\"Engineering Student · Mechatronics Intern\",\n      tagline:\"Technical training in electromechanics, a high-performance mindset and an analytical approach — geared toward dynamic, international organizations.\"\n    },\n    profile: {\n      lead:\"Electrical Energy Engineering student with technical training in Electromechanics and strong analytical skills.\",\n      body:\"Experience in high-performance sports environments and goal-oriented contexts, developing discipline, resilience and teamwork. I currently work within a large team that strengthens my communication, negotiation and results-orientation skills. Interested in growing within dynamic, international organizations, contributing analytical thinking, adaptability and a collaborative approach.\"\n    },\n    facts: [\n      { k:\"Location\", v:\"San Isidro, Greater BA\" },\n      { k:\"Born\", v:\"07 Mar 2007\" },\n      { k:\"Focus\", v:\"Electrical energy · Mechatronics\" },\n      { k:\"Availability\", v:\"Internships / intl. roles\" }\n    ],\n    experience: [\n      { period:\"Mar 2026 — Present\", role:\"Engineering Intern\", org:\"Laboratorio Pablo Cassará\",\n        meta:\"Dual System · Mechatronics technical degree · AHK (Argentine-German Chamber)\",\n        points:[\n          \"First experience in a real industrial setting, developing team communication and exchanging ideas and projects across departments.\",\n          \"Built an understanding of the excellence and structure the sector demands — and how to put it into practice.\"\n        ],\n        tags:[\"Industry\",\"Mechatronics\",\"Teamwork\"] },\n      { period:\"May 2025 — Dec 2025\", role:\"Professional Practice\", org:\"FabLab\",\n        meta:\"Digital fabrication · School program\",\n        points:[\n          \"Training in digital fabrication: 3D printing, laser cutting and CNC.\",\n          \"Collaboration within multidisciplinary technical teams.\",\n          \"Took part in Siemens' LOGO! 2025 contest.\"\n        ],\n        tags:[\"3D printing\",\"Laser cutting\",\"CNC\",\"Siemens LOGO!\"] },\n      { period:\"2023\", role:\"High-Performance Athlete\", org:\"Argentine Canoeing Federation\",\n        meta:\"Canoeing · Federated competition\",\n        points:[\n          \"Competed in the South American Canoeing Championship.\",\n          \"Long-term goal planning and structured training.\",\n          \"Resilience, discipline and performance under pressure.\"\n        ],\n        tags:[\"High performance\",\"Discipline\",\"Resilience\"] }\n    ],\n    education: [\n      { period:\"Current\", title:\"Electrical Energy Engineering\", place:\"University of Buenos Aires (UBA)\", note:\"In progress\" },\n      { period:\"2019 — 2025\", title:\"Electromechanical Technician\", place:\"Instituto Juan Segundo Fernández · San Isidro\", note:\"Secondary · Electromechanical track\" },\n      { period:\"2013 — 2018\", title:\"Primary Education\", place:\"Instituto Cervantes\", note:\"Primary level\" }\n    ],\n    skillLabels: { tech:\"Technical\", soft:\"Personal\", langs:\"Languages\" },\n    techSkills:[\"3D printing\",\"Laser cutting\",\"CNC\",\"Digital fabrication\",\"Siemens LOGO!\",\"Electromechanics\",\"Analytical thinking\"],\n    softSkills:[\"Outgoing\",\"Flexible\",\"Versatile\",\"Patient\",\"Proactive\",\"Empathetic\",\"Supportive\",\"Creative\"],\n    languages:[\"Spanish\",\"English\"],\n    contact: { heading:\"Let's build something together.\", sub:\"Open to internships and projects in technical and international environments. Get in touch and let's talk.\", cta:\"Send an email\" },\n    footer:\"Open to new opportunities\"\n  }\n};\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { lang: (props.defaultLang === 'en' ? 'en' : 'es') };\n  }\n\n  go(id){\n    const root = this._root; if(!root) return;\n    const el = root.querySelector('#'+id);\n    if(!el) return;\n    const top = el.getBoundingClientRect().top + window.scrollY - 64;\n    window.scrollTo({ top, behavior:'smooth' });\n  }\n\n  setupReveal(){\n    const root = this._root; if(!root) return;\n    if(this._io) this._io.disconnect();\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{\n        if(e.isIntersecting){\n          e.target.style.animation = 'rmFadeUp .7s cubic-bezier(.22,.61,.36,1) both';\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold:0.12, rootMargin:'0px 0px -8% 0px' });\n    root.querySelectorAll('[data-reveal]').forEach(el=>{\n      const r = el.getBoundingClientRect();\n      if(r.top < window.innerHeight*0.92){ return; } // already in view: leave visible\n      el.style.opacity = '0';\n      io.observe(el);\n    });\n    this._io = io;\n  }\n\n  setupNav(){\n    const root = this._root; if(!root) return;\n    const links = [...root.querySelectorAll('[data-nav]')];\n    const ids = ['perfil','experiencia','formacion','skills','contacto'];\n    const apply = ()=>{\n      let active = null;\n      for(const id of ids){\n        const el = root.querySelector('#'+id);\n        if(el && el.getBoundingClientRect().top <= 120) active = id;\n      }\n      links.forEach(l=>{\n        l.style.color = (l.getAttribute('data-nav')===active) ? 'var(--accent,#1F4EFF)' : 'var(--muted)';\n      });\n    };\n    apply();\n    if(this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    this._onScroll = ()=>{ window.requestAnimationFrame(apply); };\n    window.addEventListener('scroll', this._onScroll, { passive:true });\n  }\n\n  showNav(){\n    const root = this._root; if(!root) return;\n    const w = root.querySelector('[data-navwrap]');\n    if(w && window.innerWidth >= 760) w.style.display = 'flex';\n    else if(w) w.style.display = 'none';\n  }\n\n  componentDidMount(){\n    requestAnimationFrame(()=>{ this.setupReveal(); this.setupNav(); this.showNav(); });\n    this._onResize = ()=> this.showNav();\n    window.addEventListener('resize', this._onResize);\n  }\n  componentDidUpdate(){ requestAnimationFrame(()=>{ this.setupReveal(); this.setupNav(); }); }\n  componentWillUnmount(){\n    if(this._io) this._io.disconnect();\n    if(this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if(this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n\n  renderVals(){\n    const lang = this.state.lang;\n    const accent = this.props.accent || '#1F4EFF';\n    const showGrid = this.props.showGrid !== false;\n    const tabBase = \"padding:5px 13px; border-radius:999px; transition:all .2s; letter-spacing:.1em; font-family:'Space Mono',monospace; font-size:11px;\";\n    const on = tabBase + \"background:var(--ink); color:var(--bg);\";\n    const off = tabBase + \"background:transparent; color:var(--muted);\";\n    const nav = ['perfil','experiencia','formacion','skills','contacto'].map(id=>({\n      id, label: C[lang].labels[id], onClick: ()=> this.go(id)\n    }));\n    return {\n      c: C[lang],\n      accent, showGrid, nav,\n      esTabStyle: lang==='es' ? on : off,\n      enTabStyle: lang==='en' ? on : off,\n      setEs: ()=> this.setState({ lang:'es' }),\n      setEn: ()=> this.setState({ lang:'en' }),\n      goTop: ()=> window.scrollTo({ top:0, behavior:'smooth' }),\n      rootRef: (el)=>{ this._root = el; }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
